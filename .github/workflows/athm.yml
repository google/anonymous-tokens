name: ATHM

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./athm
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # pin@v6.0.1
      with:
        submodules: recursive
    - name: Build
      run: cargo build --verbose --all-targets --features=test-vectors
    - name: Run tests
      run: cargo test --verbose
    - name: Check test vectors
      run: cargo run --features=test-vectors --bin check-test-vectors test_vectors.json

  boringssl:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./athm
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # pin@v6.0.1
      with:
        submodules: recursive
    - name: Install BoringSSL build prerequisites
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build golang
    - name: Build with BoringSSL backend
      run: cargo build --verbose --features=boringssl
    - name: Run BoringSSL backend tests
      run: cargo test --verbose --features=boringssl
    - name: Run cross-backend tests
      run: cargo test --verbose --features=boringssl,rustcrypto
